<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        main { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        main::-webkit-scrollbar { display: none; }
        section { height: 100vh; width: 100vw; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* شريط الصوت العلوي */
        .top-controls {
            position: absolute; top: 10px; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; box-sizing: border-box; z-index: 10;
        }
        .volume-slider { width: 100px; accent-color: #fff; cursor: pointer; }

        /* زر تكبير الشاشة */
        .fullscreen-btn {
            background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff;
            padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;
        }

        /* عداد الوقت الأسفل */
        .time-info {
            position: absolute; bottom: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.6);
            padding: 4px 8px; border-radius: 4px; font-size: 13px; pointer-events: none;
        }
    </style>
</head>
<body>

    <main id="player">
        <section>
            <div class="top-controls">
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
                <button class="fullscreen-btn">تكبير ⛶</button>
            </div>
            <video src="https://filetoh-b6a9a1cfb5ff.herokuapp.com//dl/91480?code=6f810db865eae4eded5e46d3eaa5ee997e61bca45ef5cee6" loop playsinline></video>
            <div class="time-info">00:00 / 00:00</div>
        </section>

        <section>
            <div class="top-controls">
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
                <button class="fullscreen-btn">تكبير ⛶</button>
            </div>
            <video src="https://filetoh-b6a9a1cfb5ff.herokuapp.com//dl/91457?code=73292da25cbc9c39eb456ea58f113fef3e35ba2bf964dd90" loop playsinline></video>
            <div class="time-info">00:00 / 00:00</div>
        </section>
    </main>

    <script>
        const sections = document.querySelectorAll('section');

        sections.forEach(section => {
            const video = section.querySelector('video');
            const volume = section.querySelector('.volume-slider');
            const fullBtn = section.querySelector('.fullscreen-btn');
            const timeInfo = section.querySelector('.time-info');

            // التحكم بالصوت من الأعلى
            volume.oninput = () => { video.volume = volume.value; };

            // زر تكبير الشاشة
            fullBtn.onclick = () => {
                if (video.requestFullscreen) video.requestFullscreen();
                else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
            };

            // تشغيل وإيقاف بالضغط على الفيديو
            video.onclick = () => { video.paused ? video.play() : video.pause(); };

            // تسريع 2x ضغط مطول
            video.onpointerdown = () => { video.playbackRate = 2; };
            video.onpointerup = () => { video.playbackRate = 1; };

            // تحديث الوقت
            video.ontimeupdate = () => {
                const fmt = (t) => new Date(t * 1000).toISOString().substr(14, 5);
                timeInfo.innerText = ${fmt(video.currentTime)} / ${fmt(video.duration || 0)};
            };
        });

        // نظام السحب (تيك توك)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                if (entry.isIntersecting) v.play();
